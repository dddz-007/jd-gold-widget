name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Build Windows executables
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build_windows.ps1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JDGoldWidget-windows
          path: |
            dist/JDGoldWidget.exe
            dist/JDGoldWidgetCli.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/JDGoldWidget.exe
            dist/JDGoldWidgetCli.exe
          generate_release_notes: true
          body: |
            ## 下载说明

            - **JDGoldWidget.exe**：桌面挂件，双击即可使用
            - **JDGoldWidgetCli.exe**：命令行工具，请在终端中运行（勿双击）

            ## 系统要求

            - Windows 10 / 11
            - 已安装 Chrome / Edge / Brave / Chromium 之一
